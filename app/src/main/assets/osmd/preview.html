<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheet Music Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #FFFFFF;
            overflow-x: auto;
            overflow-y: auto;
            font-family: sans-serif;
        }
        #osmd-container {
            width: 100%;
            min-height: 200px;
            padding: 16px;
        }
        #loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: #666;
            font-size: 16px;
        }
        #error {
            display: none;
            color: #D32F2F;
            padding: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">Loading sheet music renderer...</div>
    <div id="error"></div>
    <div id="osmd-container"></div>

    <!-- Load OSMD locally (BSD-3-Clause, free) -->
    <script src="opensheetmusicdisplay.min.js"></script>
    
    <script>
        var osmd = null;
        var isReady = false;
        var totalMeasures = 0;
        var cursorEnabled = false;

        // Initialize OSMD
        function initOSMD() {
            try {
                var container = document.getElementById('osmd-container');
                osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(container, {
                    autoResize: true,
                    drawTitle: false,
                    drawSubtitle: false,
                    drawComposer: false,
                    drawLyricist: false,
                    drawPartNames: false,
                    drawPartAbbreviations: false,
                    drawMeasureNumbers: true,
                    drawTimeSignatures: true,
                    drawKeySignatures: true,
                    drawMetronomeMarks: true,
                    followCursor: false,
                    cursorsOptions: [{
                        type: 0,
                        color: "#2196F3",
                        alpha: 0.5,
                        follow: false
                    }]
                });
                isReady = true;
                document.getElementById('loading').style.display = 'none';
                
                // Notify Android that OSMD is ready
                if (window.Android) {
                    window.Android.onOsmdReady();
                }
            } catch (e) {
                showError('Failed to initialize: ' + e.message);
            }
        }

        // Load and render MusicXML
        function loadMusicXml(xmlString) {
            if (!osmd || !isReady) {
                showError('Sheet music renderer not ready');
                return;
            }

            document.getElementById('error').style.display = 'none';
            document.getElementById('osmd-container').style.display = 'block';

            try {
                osmd.load(xmlString).then(function() {
                    osmd.render();
                    
                    // Count total notes/beats for cursor navigation
                    try {
                        totalMeasures = osmd.sheet.sourceMeasures.length;
                    } catch(e) {
                        totalMeasures = 0;
                    }

                    // Cache total cursor steps after render (so we never recount)
                    cacheTotalSteps();
                    
                    // Notify Android that rendering is complete
                    if (window.Android) {
                        window.Android.onRenderComplete();
                    }
                }).catch(function(e) {
                    showError('Failed to load: ' + e.message);
                });
            } catch (e) {
                showError('Error: ' + e.message);
            }
        }

        // Count total cursor steps once after render
        function cacheTotalSteps() {
            try {
                if (!osmd || !osmd.cursor) { cachedTotalSteps = 0; return; }
                osmd.cursor.reset();
                cachedTotalSteps = 0;
                while (!osmd.cursor.iterator.endReached) {
                    cachedTotalSteps++;
                    osmd.cursor.next();
                }
                osmd.cursor.reset();
                currentStep = 0;
                lastTargetStep = -1;
            } catch (e) {
                cachedTotalSteps = 0;
            }
        }

        // Show the playback cursor
        function showCursor() {
            try {
                if (osmd && osmd.cursor) {
                    osmd.cursor.show();
                    osmd.cursor.reset();
                    currentStep = 0;
                    lastTargetStep = -1;
                    cursorEnabled = true;
                }
            } catch (e) {
                // Cursor may not be available
            }
        }

        // Hide the playback cursor
        function hideCursor() {
            try {
                if (osmd && osmd.cursor) {
                    osmd.cursor.hide();
                    cursorEnabled = false;
                    lastTargetStep = -1;
                }
            } catch (e) {
                // ignore
            }
        }

        // Reset cursor to beginning
        function resetCursor() {
            try {
                if (osmd && osmd.cursor) {
                    osmd.cursor.reset();
                    currentStep = 0;
                    lastTargetStep = -1;
                }
            } catch (e) {
                // ignore
            }
        }

        // Advance cursor to next note
        function nextCursor() {
            try {
                if (osmd && osmd.cursor && !osmd.cursor.iterator.endReached) {
                    osmd.cursor.next();
                    currentStep++;
                }
            } catch (e) {
                // ignore
            }
        }

        // Move cursor to a specific fraction (0.0 - 1.0) of the piece
        function setCursorToFraction(fraction) {
            try {
                if (!osmd || !osmd.cursor || cachedTotalSteps === 0) return;
                
                if (!cursorEnabled) {
                    osmd.cursor.show();
                    cursorEnabled = true;
                }

                var targetStep = Math.floor(fraction * cachedTotalSteps);
                targetStep = Math.max(0, Math.min(targetStep, cachedTotalSteps - 1));

                // Skip if already at the target step (dedup rapid updates)
                if (targetStep === lastTargetStep) return;
                lastTargetStep = targetStep;

                // Move cursor efficiently — go forward if possible, else reset
                if (targetStep >= currentStep) {
                    // Move forward from current position
                    var stepsToGo = targetStep - currentStep;
                    for (var i = 0; i < stepsToGo; i++) {
                        if (osmd.cursor.iterator.endReached) break;
                        osmd.cursor.next();
                    }
                } else {
                    // Need to go backwards — must reset and advance
                    osmd.cursor.reset();
                    for (var i = 0; i < targetStep; i++) {
                        if (osmd.cursor.iterator.endReached) break;
                        osmd.cursor.next();
                    }
                }
                currentStep = targetStep;

                // Manually scroll cursor into view (smooth, only if needed)
                scrollCursorIntoView();
            } catch (e) {
                // ignore cursor errors
            }
        }

        // Smoothly scroll the cursor element into the visible area if it's off-screen
        function scrollCursorIntoView() {
            try {
                var cursorEl = document.querySelector('.cursor-main, [class*="cursor"]');
                if (!cursorEl) {
                    // OSMD renders cursor as an img element inside the container
                    var imgs = document.querySelectorAll('#osmd-container img');
                    for (var i = 0; i < imgs.length; i++) {
                        if (imgs[i].style.position === 'absolute' && imgs[i].style.zIndex) {
                            cursorEl = imgs[i];
                            break;
                        }
                    }
                }
                if (cursorEl) {
                    var rect = cursorEl.getBoundingClientRect();
                    var viewWidth = window.innerWidth;
                    // Only scroll if cursor is outside the visible area (with margin)
                    if (rect.left < 0 || rect.right > viewWidth) {
                        cursorEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                }
            } catch (e) {
                // ignore scroll errors
            }
        }

        // Show error message
        function showError(message) {
            var errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            
            if (window.Android) {
                window.Android.onError(message);
            }
        }

        // Clear the display
        function clearDisplay() {
            if (osmd) {
                document.getElementById('osmd-container').innerHTML = '';
            }
        }

        // Initialize when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initOSMD);
        } else {
            initOSMD();
        }
    </script>
</body>
</html>
