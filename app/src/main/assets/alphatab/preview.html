<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheet Music Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #FFFFFF;
            overflow-x: auto;
            overflow-y: auto;
            font-family: sans-serif;
        }
        #alphaTab {
            width: 100%;
            min-height: 300px;
        }
        #loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: #666;
            font-size: 16px;
        }
        #error {
            display: none;
            color: #D32F2F;
            padding: 16px;
            text-align: center;
        }
        @media print {
            body {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            #alphaTab {
                width: 100% !important;
                transform: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="loading">Loading sheet music renderer...</div>
    <div id="error"></div>
    <div id="alphaTab"></div>

    <script src="alphaTab.min.js"></script>

    <script>
        var api = null;
        var isReady = false;
        var pendingXml = null;

        function initAlphaTab() {
            try {
                var container = document.getElementById('alphaTab');

                api = new alphaTab.AlphaTabApi(container, {
                    core: {
                        fontDirectory: 'font/',
                        tex: false,
                        useWorkers: false,
                        logLevel: 1  // Warning
                    },
                    display: {
                        staveProfile: 1,       // ScoreTab = standard notation + guitar tab
                        layoutMode: 0,         // Page layout
                        scale: 0.9,
                        barsPerRow: -1
                    },
                    notation: {
                        rhythmMode: 1,         // ShowWithBars - show rhythm on tab staff
                        smallGraceTabNotes: true
                    },
                    player: {
                        enablePlayer: false,
                        enableCursor: true,
                        enableUserInteraction: false
                    }
                });

                api.renderStarted.on(function() {
                    document.getElementById('loading').style.display = 'none';
                });

                api.renderFinished.on(function() {
                    if (window.Android) {
                        window.Android.onRenderComplete();
                    }
                    // If waiting for print-ready, fire callback
                    if (printReadyCallback) {
                        var cb = printReadyCallback;
                        printReadyCallback = null;
                        cb();
                    }
                });

                api.error.on(function(e) {
                    showError('alphaTab error: ' + (e.message || e));
                });

                api.scoreLoaded.on(function(score) {
                    // Fix: MusicXML <staff-tuning> parser sets showStandardNotation=false
                    // and standardNotationLineCount=6 (from <staff-lines>6</staff-lines>).
                    // Re-enable score display and fix line count for ScoreTab profile.
                    try {
                        for (var t = 0; t < score.tracks.length; t++) {
                            var track = score.tracks[t];
                            for (var s = 0; s < track.staves.length; s++) {
                                var staff = track.staves[s];
                                staff.showStandardNotation = true;
                                staff.showTablature = true;
                                staff.standardNotationLineCount = 5;
                            }
                        }
                    } catch (ex) {
                        // Non-fatal: tab still renders even if score fix fails
                    }
                    if (window.Android && typeof window.Android.onScoreLoaded === 'function') {
                        window.Android.onScoreLoaded(score.tracks.length);
                    }
                });

                isReady = true;
                document.getElementById('loading').style.display = 'none';

                if (window.Android) {
                    window.Android.onOsmdReady();
                }

                // If MusicXML was sent before initialization completed
                if (pendingXml) {
                    loadMusicXmlData(pendingXml);
                    pendingXml = null;
                }
            } catch (e) {
                showError('Failed to initialize alphaTab: ' + e.message);
            }
        }

        // Load MusicXML string data
        function loadMusicXml(xmlString) {
            if (!api || !isReady) {
                pendingXml = xmlString;
                return;
            }
            loadMusicXmlData(xmlString);
        }

        function loadMusicXmlData(xmlString) {
            try {
                document.getElementById('error').style.display = 'none';
                document.getElementById('alphaTab').style.display = 'block';

                // Convert string to ArrayBuffer for alphaTab's load method
                var encoder = new TextEncoder();
                var data = encoder.encode(xmlString);
                api.load(data.buffer, [0]);
            } catch (e) {
                showError('Error loading MusicXML: ' + e.message);
            }
        }

        // Show/hide cursor
        function ensureCursorElements() {
            if (document.querySelector('.at-cursor-bar')) return true;
            // alphaTab doesn't create cursor elements when enablePlayer=false.
            // Find the alphaTab rendering surface and create them manually.
            var surface = document.querySelector('.at-surface');
            if (!surface) return false;

            var wrapper = document.createElement('div');
            wrapper.classList.add('at-cursors');
            wrapper.style.position = 'absolute';
            wrapper.style.zIndex = '1000';
            wrapper.style.pointerEvents = 'none';
            wrapper.style.top = '0';
            wrapper.style.left = '0';
            wrapper.style.width = '100%';
            wrapper.style.height = '100%';

            // Ensure surface is positioned for absolute children
            if (getComputedStyle(surface).position === 'static') {
                surface.style.position = 'relative';
            }

            var barCursor = document.createElement('div');
            barCursor.classList.add('at-cursor-bar');
            barCursor.style.position = 'absolute';
            barCursor.style.background = 'rgba(255, 242, 0, 0.25)';
            barCursor.style.display = 'none';
            wrapper.appendChild(barCursor);

            var beatCursor = document.createElement('div');
            beatCursor.classList.add('at-cursor-beat');
            beatCursor.style.position = 'absolute';
            beatCursor.style.background = 'rgba(64, 64, 255, 0.75)';
            beatCursor.style.width = '3px';
            beatCursor.style.display = 'none';
            wrapper.appendChild(beatCursor);

            surface.insertBefore(wrapper, surface.firstChild);
            return true;
        }

        function showCursor() {
            if (!api) return;
            try {
                if (!ensureCursorElements()) return;
                var bar = document.querySelector('.at-cursor-bar');
                var beat = document.querySelector('.at-cursor-beat');
                if (bar) bar.style.display = 'block';
                if (beat) beat.style.display = 'block';
            } catch(e) {}
        }

        function hideCursor() {
            try {
                var bar = document.querySelector('.at-cursor-bar');
                var beat = document.querySelector('.at-cursor-beat');
                if (bar) bar.style.display = 'none';
                if (beat) beat.style.display = 'none';
            } catch(e) {}
        }

        function resetCursor() {
            hideCursor();
        }

        function nextCursor() {
            // Not used with fraction-based approach
        }

        function setCursorToFraction(fraction) {
            // Legacy — kept for compatibility but setCursorToNoteIndex is preferred
            setCursorToNoteIndex(-1); // no-op fallback
        }

        /**
         * Position the cursor on the idx-th note (beat) in the score.
         * Walks voice-0 beats in order, skipping tie-destination beats
         * (which are continuations of notes split across bar lines).
         */
        function setCursorToNoteIndex(idx) {
            if (!api || idx < 0) return;
            try {
                var bounds = api.renderer.boundsLookup;
                if (!bounds) return;

                var score = api.score;
                if (!score) return;

                var track = score.tracks[0];
                if (!track) return;
                var staff = track.staves[0];
                if (!staff) return;

                // Walk voice-0 beats, counting only non-tie-destination beats
                var count = 0;
                var foundBeat = null;
                for (var b = 0; b < staff.bars.length; b++) {
                    var bar = staff.bars[b];
                    if (bar.voices.length === 0) continue;
                    var voice = bar.voices[0];
                    for (var i = 0; i < voice.beats.length; i++) {
                        var beat = voice.beats[i];
                        // Skip tie-destination beats (note split across bar line)
                        var isTieDest = false;
                        if (beat.notes && beat.notes.length > 0) {
                            for (var n = 0; n < beat.notes.length; n++) {
                                if (beat.notes[n].isTieDestination) {
                                    isTieDest = true;
                                    break;
                                }
                            }
                        }
                        if (isTieDest) continue;

                        if (count === idx) {
                            foundBeat = beat;
                            break;
                        }
                        count++;
                    }
                    if (foundBeat) break;
                }

                if (!foundBeat) return;

                // Get visual bounds for this beat
                var beatBounds = bounds.findBeat(foundBeat);
                if (!beatBounds || !beatBounds.visualBounds) return;

                if (!ensureCursorElements()) return;

                var barCursor = document.querySelector('.at-cursor-bar');
                var beatCursor = document.querySelector('.at-cursor-beat');

                // Position the bar highlight using the master bar bounds
                if (barCursor && beatBounds.barBounds && beatBounds.barBounds.masterBarBounds) {
                    var mb = beatBounds.barBounds.masterBarBounds;
                    barCursor.style.display = 'block';
                    barCursor.style.top = mb.visualBounds.y + 'px';
                    barCursor.style.left = mb.visualBounds.x + 'px';
                    barCursor.style.width = mb.visualBounds.w + 'px';
                    barCursor.style.height = mb.visualBounds.h + 'px';
                }

                // Position the beat cursor line
                if (beatCursor) {
                    beatCursor.style.display = 'block';
                    beatCursor.style.top = beatBounds.visualBounds.y + 'px';
                    beatCursor.style.left = beatBounds.visualBounds.x + 'px';
                    beatCursor.style.width = '3px';
                    beatCursor.style.height = beatBounds.visualBounds.h + 'px';
                }
            } catch(e) {
                // Non-fatal cursor positioning error
            }
        }

        function showError(message) {
            var errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('loading').style.display = 'none';

            if (window.Android) {
                window.Android.onError(message);
            }
        }

        function clearDisplay() {
            if (api) {
                // Reset by loading empty
                document.getElementById('alphaTab').innerHTML = '';
            }
        }

        function setScale(scale) {
            if (api) {
                api.settings.display.scale = scale;
                api.updateSettings();
                api.render();
            }
        }

        function setBarsPerRow(bars) {
            if (api) {
                api.settings.display.barsPerRow = bars;
                api.updateSettings();
                api.render();
            }
        }

        // Prepare for PDF printing: re-render at print-friendly width
        var printReadyCallback = null;
        var savedScale = 0.9;
        var savedWidth = -1;
        var savedBarsPerRow = -1;

        function prepareForPrint() {
            if (!api) return;
            // Save current settings
            savedScale = api.settings.display.scale;
            savedWidth = api.settings.display.width;
            savedBarsPerRow = api.settings.display.barsPerRow;
            // Keep current scale and barsPerRow — only set width to match
            // letter page printable area: 7.5in × 96dpi = 720px
            api.settings.display.width = 720;
            api.updateSettings();

            // Listen for render completion to signal print-ready
            printReadyCallback = function() {
                if (window.Android && typeof window.Android.onPrintReady === 'function') {
                    window.Android.onPrintReady();
                }
            };
            api.render();
        }

        function restoreAfterPrint() {
            if (!api) return;
            api.settings.display.scale = savedScale;
            api.settings.display.width = savedWidth;
            api.settings.display.barsPerRow = savedBarsPerRow;
            api.updateSettings();
            api.render();
        }

        // Initialize when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAlphaTab);
        } else {
            initAlphaTab();
        }
    </script>
</body>
</html>
