<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheet Music Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #FFFFFF;
            overflow-x: auto;
            overflow-y: auto;
            font-family: sans-serif;
        }
        #alphaTab {
            width: 100%;
            min-height: 300px;
        }
        #loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: #666;
            font-size: 16px;
        }
        #error {
            display: none;
            color: #D32F2F;
            padding: 16px;
            text-align: center;
        }
        @media print {
            body {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
            }
            #alphaTab {
                width: 100% !important;
                transform: none !important;
                overflow: visible !important;
            }
            .at-surface {
                width: 100% !important;
            }
            #loading, #error, #pdf-debug {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="loading">Loading sheet music renderer...</div>
    <div id="error"></div>
    <div id="pdf-debug" style="display:none; padding:8px; background:#fffde7; border:1px solid #fbc02d; font-size:11px; font-family:monospace; white-space:pre-wrap;"></div>
    <div id="alphaTab"></div>

    <script src="alphaTab.min.js"></script>

    <script>
        var api = null;
        var isReady = false;
        var pendingXml = null;

        function initAlphaTab() {
            try {
                var container = document.getElementById('alphaTab');

                api = new alphaTab.AlphaTabApi(container, {
                    core: {
                        fontDirectory: 'font/',
                        tex: false,
                        useWorkers: false,
                        logLevel: 1  // Warning
                    },
                    display: {
                        staveProfile: 1,       // ScoreTab = standard notation + guitar tab
                        layoutMode: 0,         // Page layout
                        scale: 0.9,
                        barsPerRow: -1
                    },
                    notation: {
                        rhythmMode: 1,         // ShowWithBars - show rhythm on tab staff
                        smallGraceTabNotes: true
                    },
                    player: {
                        enablePlayer: false,
                        enableCursor: true,
                        enableUserInteraction: false
                    }
                });

                api.renderStarted.on(function() {
                    document.getElementById('loading').style.display = 'none';
                    pdfLog('renderStarted: scale=' + api.settings.display.scale + ', width=' + api.settings.display.width + ', viewport=' + window.innerWidth + 'x' + window.innerHeight);
                });

                api.renderFinished.on(function() {
                    var surface = document.querySelector('.at-surface');
                    pdfLog('renderFinished: surface=' + (surface ? surface.offsetWidth + 'x' + surface.offsetHeight : 'null') + ', container=' + document.getElementById('alphaTab').offsetWidth);
                    if (window.Android) {
                        window.Android.onRenderComplete();
                    }
                    // If waiting for print-ready, fire callback
                    if (printReadyCallback) {
                        var cb = printReadyCallback;
                        printReadyCallback = null;
                        cb();
                    }
                });

                api.error.on(function(e) {
                    showError('alphaTab error: ' + (e.message || e));
                });

                api.scoreLoaded.on(function(score) {
                    // Fix: MusicXML <staff-tuning> parser sets showStandardNotation=false
                    // and standardNotationLineCount=6 (from <staff-lines>6</staff-lines>).
                    // Re-enable score display and fix line count for ScoreTab profile.
                    try {
                        for (var t = 0; t < score.tracks.length; t++) {
                            var track = score.tracks[t];
                            for (var s = 0; s < track.staves.length; s++) {
                                var staff = track.staves[s];
                                staff.showStandardNotation = true;
                                staff.showTablature = true;
                                staff.standardNotationLineCount = 5;
                            }
                        }
                    } catch (ex) {
                        // Non-fatal: tab still renders even if score fix fails
                    }
                    if (window.Android && typeof window.Android.onScoreLoaded === 'function') {
                        window.Android.onScoreLoaded(score.tracks.length);
                    }
                });

                isReady = true;
                document.getElementById('loading').style.display = 'none';

                if (window.Android) {
                    window.Android.onOsmdReady();
                }

                // If MusicXML was sent before initialization completed
                if (pendingXml) {
                    loadMusicXmlData(pendingXml);
                    pendingXml = null;
                }
            } catch (e) {
                showError('Failed to initialize alphaTab: ' + e.message);
            }
        }

        // Load MusicXML string data
        function loadMusicXml(xmlString) {
            if (!api || !isReady) {
                pendingXml = xmlString;
                return;
            }
            loadMusicXmlData(xmlString);
        }

        function loadMusicXmlData(xmlString) {
            try {
                document.getElementById('error').style.display = 'none';
                document.getElementById('alphaTab').style.display = 'block';

                // Validate XML before sending to alphaTab
                if (!xmlString || xmlString.length === 0) {
                    showError('Empty MusicXML data received');
                    return;
                }
                var trimmed = xmlString.trim();
                if (trimmed.indexOf('<?xml') !== 0 && trimmed.indexOf('<score-partwise') !== 0) {
                    showError('Invalid MusicXML data (length=' + xmlString.length + ', starts: ' + xmlString.substring(0, 40) + ')');
                    return;
                }

                // Convert string to ArrayBuffer for alphaTab's load method
                var encoder = new TextEncoder();
                var data = encoder.encode(xmlString);
                api.load(data.buffer, [0]);
            } catch (e) {
                showError('Error loading MusicXML: ' + e.message);
            }
        }

        // Show/hide cursor
        function ensureCursorElements() {
            if (document.querySelector('.at-cursor-bar')) return true;
            // alphaTab doesn't create cursor elements when enablePlayer=false.
            // Find the alphaTab rendering surface and create them manually.
            var surface = document.querySelector('.at-surface');
            if (!surface) return false;

            var wrapper = document.createElement('div');
            wrapper.classList.add('at-cursors');
            wrapper.style.position = 'absolute';
            wrapper.style.zIndex = '1000';
            wrapper.style.pointerEvents = 'none';
            wrapper.style.top = '0';
            wrapper.style.left = '0';
            wrapper.style.width = '100%';
            wrapper.style.height = '100%';

            // Ensure surface is positioned for absolute children
            if (getComputedStyle(surface).position === 'static') {
                surface.style.position = 'relative';
            }

            var barCursor = document.createElement('div');
            barCursor.classList.add('at-cursor-bar');
            barCursor.style.position = 'absolute';
            barCursor.style.background = 'rgba(255, 242, 0, 0.25)';
            barCursor.style.display = 'none';
            wrapper.appendChild(barCursor);

            var beatCursor = document.createElement('div');
            beatCursor.classList.add('at-cursor-beat');
            beatCursor.style.position = 'absolute';
            beatCursor.style.background = 'rgba(64, 64, 255, 0.75)';
            beatCursor.style.width = '3px';
            beatCursor.style.display = 'none';
            wrapper.appendChild(beatCursor);

            surface.insertBefore(wrapper, surface.firstChild);
            return true;
        }

        function showCursor() {
            if (!api) return;
            try {
                if (!ensureCursorElements()) return;
                var bar = document.querySelector('.at-cursor-bar');
                var beat = document.querySelector('.at-cursor-beat');
                if (bar) bar.style.display = 'block';
                if (beat) beat.style.display = 'block';
            } catch(e) {}
        }

        function hideCursor() {
            try {
                var bar = document.querySelector('.at-cursor-bar');
                var beat = document.querySelector('.at-cursor-beat');
                if (bar) bar.style.display = 'none';
                if (beat) beat.style.display = 'none';
            } catch(e) {}
        }

        function resetCursor() {
            hideCursor();
        }

        function nextCursor() {
            // Not used with fraction-based approach
        }

        function setCursorToFraction(fraction) {
            // Legacy — kept for compatibility but setCursorToNoteIndex is preferred
            setCursorToNoteIndex(-1); // no-op fallback
        }

        /**
         * Position the cursor on the idx-th note (beat) in the score.
         * Walks voice-0 beats in order, skipping tie-destination beats
         * (which are continuations of notes split across bar lines).
         */
        function setCursorToNoteIndex(idx) {
            if (!api || idx < 0) return;
            try {
                var bounds = api.renderer.boundsLookup;
                if (!bounds) return;

                var score = api.score;
                if (!score) return;

                var track = score.tracks[0];
                if (!track) return;
                var staff = track.staves[0];
                if (!staff) return;

                // Walk voice-0 beats, counting only non-tie-destination beats
                var count = 0;
                var foundBeat = null;
                for (var b = 0; b < staff.bars.length; b++) {
                    var bar = staff.bars[b];
                    if (bar.voices.length === 0) continue;
                    var voice = bar.voices[0];
                    for (var i = 0; i < voice.beats.length; i++) {
                        var beat = voice.beats[i];
                        // Skip tie-destination beats (note split across bar line)
                        var isTieDest = false;
                        if (beat.notes && beat.notes.length > 0) {
                            for (var n = 0; n < beat.notes.length; n++) {
                                if (beat.notes[n].isTieDestination) {
                                    isTieDest = true;
                                    break;
                                }
                            }
                        }
                        if (isTieDest) continue;

                        if (count === idx) {
                            foundBeat = beat;
                            break;
                        }
                        count++;
                    }
                    if (foundBeat) break;
                }

                if (!foundBeat) return;

                // Get visual bounds for this beat
                var beatBounds = bounds.findBeat(foundBeat);
                if (!beatBounds || !beatBounds.visualBounds) return;

                if (!ensureCursorElements()) return;

                var barCursor = document.querySelector('.at-cursor-bar');
                var beatCursor = document.querySelector('.at-cursor-beat');

                // Position the bar highlight using the master bar bounds
                if (barCursor && beatBounds.barBounds && beatBounds.barBounds.masterBarBounds) {
                    var mb = beatBounds.barBounds.masterBarBounds;
                    barCursor.style.display = 'block';
                    barCursor.style.top = mb.visualBounds.y + 'px';
                    barCursor.style.left = mb.visualBounds.x + 'px';
                    barCursor.style.width = mb.visualBounds.w + 'px';
                    barCursor.style.height = mb.visualBounds.h + 'px';
                }

                // Position the beat cursor line
                if (beatCursor) {
                    beatCursor.style.display = 'block';
                    beatCursor.style.top = beatBounds.visualBounds.y + 'px';
                    beatCursor.style.left = beatBounds.visualBounds.x + 'px';
                    beatCursor.style.width = '3px';
                    beatCursor.style.height = beatBounds.visualBounds.h + 'px';
                }
            } catch(e) {
                // Non-fatal cursor positioning error
            }
        }

        function showError(message) {
            var errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('loading').style.display = 'none';

            if (window.Android) {
                window.Android.onError(message);
            }
        }

        function clearDisplay() {
            if (api) {
                // Reset by loading empty
                document.getElementById('alphaTab').innerHTML = '';
            }
        }

        function setScale(scale) {
            if (api) {
                api.settings.display.scale = scale;
                api.updateSettings();
                api.render();
            }
        }

        function setBarsPerRow(bars) {
            if (api) {
                api.settings.display.barsPerRow = bars;
                api.updateSettings();
                api.render();
            }
        }

        // ══════════════════════════════════════════════════════════════
        // PDF EXPORT — logging + dimension tracking
        // ══════════════════════════════════════════════════════════════
        var printReadyCallback = null;
        var savedScale = 0.9;
        var savedWidth = -1;
        var savedBarsPerRow = -1;
        var savedViewportContent = null;

        function pdfLog(msg) {
            console.log('[PDF] ' + msg);
            if (window.Android && typeof window.Android.onPdfLog === 'function') {
                window.Android.onPdfLog(msg);
            }
        }

        /**
         * Dump all dimensions relevant to PDF rendering.
         * Returns a JSON string and optionally shows it in-page.
         */
        function dumpPdfDebugInfo(showInPage) {
            var container = document.getElementById('alphaTab');
            var surface = document.querySelector('.at-surface');
            var info = {
                viewport: {
                    innerWidth: window.innerWidth,
                    innerHeight: window.innerHeight,
                    devicePixelRatio: window.devicePixelRatio,
                    metaContent: (function() {
                        var m = document.querySelector('meta[name="viewport"]');
                        return m ? m.getAttribute('content') : null;
                    })()
                },
                body: {
                    clientWidth: document.body.clientWidth,
                    scrollWidth: document.body.scrollWidth,
                    offsetWidth: document.body.offsetWidth
                },
                container: container ? {
                    clientWidth: container.clientWidth,
                    scrollWidth: container.scrollWidth,
                    offsetWidth: container.offsetWidth,
                    offsetHeight: container.offsetHeight
                } : null,
                surface: surface ? {
                    clientWidth: surface.clientWidth,
                    scrollWidth: surface.scrollWidth,
                    offsetWidth: surface.offsetWidth,
                    offsetHeight: surface.offsetHeight,
                    style_width: surface.style.width,
                    style_height: surface.style.height
                } : null,
                alphaTab: api ? {
                    scale: api.settings.display.scale,
                    width: api.settings.display.width,
                    barsPerRow: api.settings.display.barsPerRow,
                    layoutMode: api.settings.display.layoutMode,
                    staveProfile: api.settings.display.staveProfile
                } : null,
                print: {
                    letterWidthIn: 8.5,
                    letterHeightIn: 11,
                    marginIn: 0.5,
                    printableWidthIn: 7.5,
                    printableWidthPx_at72dpi: 540,
                    printableWidthPx_at96dpi: 720,
                    contentToViewportRatio: container ? (container.scrollWidth / window.innerWidth) : null
                }
            };
            var json = JSON.stringify(info, null, 2);
            pdfLog('Debug info: ' + json);

            if (showInPage) {
                var dbg = document.getElementById('pdf-debug');
                if (dbg) {
                    dbg.style.display = 'block';
                    dbg.textContent = json;
                }
            }
            return json;
        }

        /**
         * Root cause of "half page width" bug:
         * Android's print adapter re-renders HTML at the page's CSS pixel width.
         * For Letter paper: 8.5" × 96 CSS-px/in = 816px (no margins)
         *                   7.5" × 96 CSS-px/in = 720px (0.5" margins)
         *
         * alphaTab renders SVGs at a fixed pixel width (api.settings.display.width).
         * If we set width=window.innerWidth (~411px on S24), the 411px SVG
         * sits in a 720px print viewport → fills only 57% → "half the page".
         *
         * Fix: hardcode width=720 to match Letter with 0.5" margins at 96dpi.
         * Also: do NOT override barsPerRow (prevents the "flash" of rearranged bars).
         */
        function prepareForPrint() {
            if (!api) return;
            pdfLog('=== prepareForPrint START ===');

            // Save current settings
            savedScale = api.settings.display.scale;
            savedWidth = api.settings.display.width;
            savedBarsPerRow = api.settings.display.barsPerRow;
            pdfLog('Saved: scale=' + savedScale + ', width=' + savedWidth + ', bars=' + savedBarsPerRow);

            // Dump pre-print dimensions
            dumpPdfDebugInfo(false);

            // ── KEY FIX: widen the viewport & container so alphaTab actually
            // renders SVGs at 720px instead of clamping to 360px viewport ──
            //
            // Problem: <meta viewport width=device-width> → 360 CSS px on S24
            //          #alphaTab { width:100% } → 360px container
            //          alphaTab clamps SVGs to container width → 360px SVGs
            //          Print adapter puts 360px SVGs on 720px page → half width
            //
            // Fix: change viewport to width=720 so container becomes 720px,
            //      then alphaTab renders 720px SVGs that fill the page.
            var PRINT_WIDTH = 720;
            var PRINT_SCALE = 1.0;

            // 1. Save and widen viewport meta tag
            var viewportMeta = document.querySelector('meta[name="viewport"]');
            if (viewportMeta) {
                savedViewportContent = viewportMeta.getAttribute('content');
                viewportMeta.setAttribute('content', 'width=' + PRINT_WIDTH);
                pdfLog('Viewport changed to width=' + PRINT_WIDTH + ' (was: ' + savedViewportContent + ')');
            }

            // 2. Force container & body to print width
            document.body.style.width = PRINT_WIDTH + 'px';
            document.body.style.overflow = 'hidden';
            var container = document.getElementById('alphaTab');
            if (container) container.style.width = PRINT_WIDTH + 'px';

            // 3. Set alphaTab display settings
            pdfLog('Setting print: width=' + PRINT_WIDTH + ', scale=' + PRINT_SCALE + ', bars=KEEP(' + savedBarsPerRow + ')');
            api.settings.display.width = PRINT_WIDTH;
            api.settings.display.scale = PRINT_SCALE;
            // DO NOT change barsPerRow — preserve user's layout
            api.updateSettings();

            // Listen for render completion to signal print-ready
            printReadyCallback = function() {
                pdfLog('Render complete — print ready');
                dumpPdfDebugInfo(false);
                if (window.Android && typeof window.Android.onPrintReady === 'function') {
                    window.Android.onPrintReady();
                }
            };
            api.render();
        }

        function restoreAfterPrint() {
            if (!api) return;
            pdfLog('=== restoreAfterPrint START ===');

            // 1. Restore viewport meta tag
            var viewportMeta = document.querySelector('meta[name="viewport"]');
            if (viewportMeta && savedViewportContent) {
                viewportMeta.setAttribute('content', savedViewportContent);
                pdfLog('Viewport restored to: ' + savedViewportContent);
            }

            // 2. Restore container & body widths
            document.body.style.width = '';
            document.body.style.overflow = '';
            var container = document.getElementById('alphaTab');
            if (container) container.style.width = '100%';

            // 3. Restore alphaTab settings
            pdfLog('Restoring: scale=' + savedScale + ', width=' + savedWidth + ', bars=' + savedBarsPerRow);
            api.settings.display.scale = savedScale;
            api.settings.display.width = savedWidth;
            api.settings.display.barsPerRow = savedBarsPerRow;
            api.updateSettings();
            api.render();
        }

        // Initialize when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAlphaTab);
        } else {
            initAlphaTab();
        }
    </script>
</body>
</html>
